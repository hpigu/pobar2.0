services:

  mysql:
    image: mysql:8.0
    container_name: pobar-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: pobar
      MYSQL_USER: ${DB_USER:-pobar}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pobar_pass}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pobar-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-pobar}
      DB_PASSWORD: ${DB_PASSWORD:-pobar_pass}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_TO_A_RANDOM_64_CHAR_STRING_POBAR_SECRET_KEY_2026}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-}
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
      - logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pobar-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql-data:
  uploads:
  backups:
  logs:
