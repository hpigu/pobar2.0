# ─────────────────────────────────────────
# Server
# ─────────────────────────────────────────
server.port=8080
spring.application.name=pobar

# ─────────────────────────────────────────
# Database
# ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/pobar?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Taipei
spring.datasource.username=root
spring.datasource.password=test1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────
# MyBatis Plus
# ─────────────────────────────────────────
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=isActive
mybatis-plus.global-config.db-config.logic-delete-value=0
mybatis-plus.global-config.db-config.logic-not-delete-value=1

# ─────────────────────────────────────────
# JWT
# ─────────────────────────────────────────
jwt.secret=CHANGE_THIS_TO_A_RANDOM_64_CHAR_STRING_POBAR_SECRET_KEY_2026
jwt.expiration-hours=8

# ─────────────────────────────────────────
# 檔案上傳（品項圖片）
# ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads/images

# ─────────────────────────────────────────
# 備份設定
# ─────────────────────────────────────────
backup.output-dir=./backups
backup.mysql-dump-path=mysqldump

# ─────────────────────────────────────────
# ECPay 電子發票（正式上線前設定）
# ─────────────────────────────────────────
# ecpay.merchant-id=
# ecpay.hash-key=
# ecpay.hash-iv=
# ecpay.invoice.api-url=https://einvoice.ecpay.com.tw/B2CInvoice/Issue

# ─────────────────────────────────────────
# 初始管理員（首次啟動後請移除 password 設定）
# ─────────────────────────────────────────
app.init-admin.account=admin
# app.init-admin.password=請設定首次密碼

# ─────────────────────────────────────────
# 時區 / JSON
# ─────────────────────────────────────────
spring.jackson.time-zone=Asia/Taipei
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
