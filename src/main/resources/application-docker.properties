# Docker 環境設定（覆蓋 application.properties 的預設值）
spring.datasource.url=jdbc:mysql://mysql:3306/pobar?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:pobar}
spring.datasource.password=${DB_PASSWORD:pobar_pass}

jwt.secret=${JWT_SECRET:CHANGE_THIS_TO_A_RANDOM_64_CHAR_STRING_POBAR_SECRET_KEY_2026}

file.upload-dir=/app/uploads/images
backup.output-dir=/app/backups

app.init-admin.password=${INIT_ADMIN_PASSWORD:}
