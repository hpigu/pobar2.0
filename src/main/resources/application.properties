# ═══════════════════════════════════════════════════════════
# 共用設定 — 與環境無關
# 各環境差異請見 application-{local|sit|prod}.properties
# ═══════════════════════════════════════════════════════════

# ─────────────────────────────────────────
# Profile：預設 local，可被 SPRING_PROFILES_ACTIVE 覆寫
# ─────────────────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ─────────────────────────────────────────
# Application
# ─────────────────────────────────────────
spring.application.name=pobar
server.port=${SERVER_PORT:8080}
spring.jackson.time-zone=Asia/Taipei
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ─────────────────────────────────────────
# Actuator（健康檢查 / 監控）— 共用基礎設定
# 各 profile 會覆寫 endpoints.web.exposure.include 來決定暴露哪些
# ─────────────────────────────────────────
management.endpoints.web.base-path=/actuator
# health endpoint：non-prod 顯示完整、prod 不顯示細節（profile 內覆寫）
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
# 不要洩漏內部 group / role
management.endpoint.health.probes.enabled=true
# 應用程式資訊（顯示在 /actuator/info）
management.info.env.enabled=true
management.info.java.enabled=true
management.info.build.enabled=true
info.app.name=${spring.application.name}
info.app.description=Pobar bar management system

# ─────────────────────────────────────────
# Datasource Driver（連線字串各 profile 自訂）
# ─────────────────────────────────────────
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────
# MyBatis Plus
# ─────────────────────────────────────────
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 邏輯刪除欄位（isActive 為 Boolean）
mybatis-plus.global-config.db-config.logic-delete-field=isActive
mybatis-plus.global-config.db-config.logic-delete-value=false
mybatis-plus.global-config.db-config.logic-not-delete-value=true

# ─────────────────────────────────────────
# JWT 雙 token 機制
#   - access token (JWT, 短 TTL, 所有 API 用此)
#   - refresh token (opaque, 長 TTL, 只能換 access token, 可 revoke)
# ─────────────────────────────────────────
jwt.access-expiration-minutes=${JWT_ACCESS_EXPIRATION_MINUTES:15}
# 一般裝置 refresh token 存活時間
jwt.refresh-standard-days=${JWT_REFRESH_STANDARD_DAYS:7}
# 本機記住勾選後 refresh token 存活時間
jwt.refresh-trusted-days=${JWT_REFRESH_TRUSTED_DAYS:30}

# ─────────────────────────────────────────
# 檔案上傳大小限制（路徑各 profile 自訂）
# ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ─────────────────────────────────────────
# 圖片儲存策略（Batch 3 會接 StorageService）
#   local  → 寫本機檔案系統
#   s3     → 寫 AWS S3（prod 用）
# ─────────────────────────────────────────
storage.type=${STORAGE_TYPE:local}

# ─────────────────────────────────────────
# ECPay 電子發票（綠界）— 所有環境皆從環境變數讀取
# 申請取得後請設定環境變數，未設定則發票流程不會啟用
# ─────────────────────────────────────────
ecpay.merchant-id=${ECPAY_MERCHANT_ID:}
ecpay.hash-key=${ECPAY_HASH_KEY:}
ecpay.hash-iv=${ECPAY_HASH_IV:}
ecpay.invoice.api-url=${ECPAY_INVOICE_API_URL:https://einvoice-stage.ecpay.com.tw/B2CInvoice/Issue}

# ─────────────────────────────────────────
# 初始管理員（A1 流程）
# 帳號可固定，但密碼一律從環境變數讀，且設定後首次登入強制改密碼
# ─────────────────────────────────────────
app.init-admin.account=${INIT_ADMIN_ACCOUNT:admin}
app.init-admin.password=${INIT_ADMIN_PASSWORD:}
