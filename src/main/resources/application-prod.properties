# ═══════════════════════════════════════════════════════════
# Production（正式環境）
# 啟動方式：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 安全規則：
#   1. 所有敏感值都【必須】從環境變數讀取，properties 內不存在預設值
#   2. 缺少必要環境變數時應用會啟動失敗（這是刻意的，避免配置遺漏）
#   3. DB 不對外暴露，需 SSH Tunnel / Bastion 才能用工具連線
#   4. 啟動前請確認 docs/env-setup.md 列出的環境變數都已設定
# ═══════════════════════════════════════════════════════════

# ─────────────────────────────────────────
# Database — 預設走 localhost（搭配 SSH Tunnel / 同機 Docker 內網）
# ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:pobar}?useUnicode=true&characterEncoding=UTF-8&useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ─────────────────────────────────────────
# Datasource Pool — 正式環境調整
# ─────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# ─────────────────────────────────────────
# JWT — 【必填】無預設值
# ─────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ─────────────────────────────────────────
# 檔案路徑
# ─────────────────────────────────────────
file.upload-dir=${FILE_UPLOAD_DIR:/app/uploads}
backup.output-dir=${BACKUP_OUTPUT_DIR:/app/backups}
backup.mysql-dump-path=${MYSQL_DUMP_PATH:mysqldump}

# ─────────────────────────────────────────
# 儲存（未來上 S3 時改 STORAGE_TYPE=s3）
# ─────────────────────────────────────────
storage.type=${STORAGE_TYPE:local}
storage.s3.bucket=${S3_BUCKET:}
storage.s3.region=${S3_REGION:ap-northeast-1}
storage.s3.access-key=${S3_ACCESS_KEY:}
storage.s3.secret-key=${S3_SECRET_KEY:}

# ─────────────────────────────────────────
# CORS — Prod 同樣走 nginx 反代（同 origin），預設關閉
# 若前後端分 domain（例如 api.xxx.com / www.xxx.com）才需設定
# ─────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# ─────────────────────────────────────────
# 日誌 — 詳細配置由 logback-spring.xml 接管
# 路徑由環境變數 LOG_DIR 控制（docker-compose 設定為 /app/logs）
# 這裡只保留 root level（與 logback profile=prod 一致）
# ─────────────────────────────────────────
logging.level.root=WARN

# ─────────────────────────────────────────
# Actuator — 正式環境只開 health（給 load balancer / k8s 用）+ info
# health 不顯示細節，避免暴露 DB 連線等資訊給匿名用戶
# 如需內部監控，建議透過 SSH Tunnel + 內部 IP 訪問
# ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never

# ─────────────────────────────────────────
# Server — 隱藏錯誤頁細節
# ─────────────────────────────────────────
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
