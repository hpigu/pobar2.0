# ═══════════════════════════════════════════════════════════
# Local（本機開發）— 直接在 IDE 或 mvn spring-boot:run 啟動時使用
# 啟動方式：
#   mvn spring-boot:run
#   或 IDE 內直接執行（已有 spring.profiles.active=local 預設）
# ═══════════════════════════════════════════════════════════

# ─────────────────────────────────────────
# Database — 連線本機 MySQL
# ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/pobar?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:test1234}

# ─────────────────────────────────────────
# JWT — 開發用固定 secret（正式環境絕不可用）
# ─────────────────────────────────────────
jwt.secret=${JWT_SECRET:LOCAL_DEV_ONLY_SECRET_DO_NOT_USE_IN_PRODUCTION_POBAR_2026_____}

# ─────────────────────────────────────────
# 檔案路徑 — 寫到專案根目錄下
# ─────────────────────────────────────────
file.upload-dir=./uploads
backup.output-dir=./backups
backup.mysql-dump-path=mysqldump

# ─────────────────────────────────────────
# CORS — 允許本機前端
# ─────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173

# ─────────────────────────────────────────
# 日誌 — 詳細配置由 logback-spring.xml 接管（profile=local 啟用 DEBUG）
# 這裡只設 mybatis SQL 輸出
# ─────────────────────────────────────────
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ─────────────────────────────────────────
# Actuator — 本機開發暴露多一點方便 debug
# ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

app.init-admin.password=${INIT_ADMIN_PASSWORD:admin1234}
