# ═══════════════════════════════════════════════════════════
# SIT（System Integration Test，Docker 測試環境）
# 啟動方式：docker compose up -d
#
# 所有敏感值都從環境變數讀取，請在 docker-compose.yml 或 .env 設定。
# ═══════════════════════════════════════════════════════════

# ─────────────────────────────────────────
# Database — 透過 Docker 內網連線
# ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:pobar}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
spring.datasource.username=${DB_USER:pobar}
spring.datasource.password=${DB_PASSWORD:pobar_pass}

# ─────────────────────────────────────────
# JWT — 必須由環境變數提供
# ─────────────────────────────────────────
jwt.secret=${JWT_SECRET:}

# ─────────────────────────────────────────
# 檔案路徑 — 寫到 Docker volume
# ─────────────────────────────────────────
file.upload-dir=/app/uploads
backup.output-dir=/app/backups
backup.mysql-dump-path=mysqldump

# ─────────────────────────────────────────
# CORS — SIT 透過 nginx 反代（同 origin），預設關閉
# 若改成前後端分離部署，再設 CORS_ALLOWED_ORIGINS 環境變數
# ─────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# ─────────────────────────────────────────
# 日誌 — 詳細配置由 logback-spring.xml 接管
# 路徑由環境變數 LOG_DIR 控制（docker-compose 設定為 /app/logs）
# 這裡只設 level，避免與 logback 衝突
# ─────────────────────────────────────────
logging.level.root=INFO

# ─────────────────────────────────────────
# Actuator — SIT 暴露 health + info + metrics
# ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
